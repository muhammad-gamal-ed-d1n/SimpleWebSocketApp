<div class="main">
  @if (openChat) {

  <div class="chat">
    @for (msg of messages; track $index) {
    @if (msg.type == 'JOIN') {
    <div class="system join">{{msg.sender}} joined the chat</div>
    }
    @else if (msg.type == 'LEAVE') {
    <div class="system leave">{{msg.sender}} left the chat</div>
    }
    @else if (msg.type == 'MESSAGE') {
    <div class="message">
      <span class="username">{{msg.sender}}:</span>
      <span class="text">{{msg.content}}</span>
    </div>
    }
    }
    <div class="send-container">
      <form (ngSubmit)="sendMessage()" class="send-form">

        <input [(ngModel)]="message" name="message" class="message-input" placeholder="Type a message..." type="text"
          autocomplete="off" />

        <button type="submit" class="send-btn">
          Send
        </button>

      </form>
    </div>
  </div>
  }
  @else {
  <form (ngSubmit)="join()">
    <input [(ngModel)]="username" name="username" placeholder="Enter Username" type="text">
    <br>
    <button type="submit">Enter Chat</button>
  </form>
  }
